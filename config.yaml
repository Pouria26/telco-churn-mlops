# config.yaml file
globals:
  random_seed: 42
  target_col: "Churn Value"
  cltv_target_col: "CLTV"

data:
  passthrough_features:
    - "Gender"
    - "Senior Citizen"
    - "Partner"
    - "Dependents"
    - "Phone Service"
    - "Contract"
    - "Paperless Billing"

models:
  logistic_regression:
    max_iter: 800
    class_weight: "balanced"
  random_forest:
    n_estimators: 600
    max_depth: 12
    min_samples_split: 10
    min_samples_leaf: 5
  xgboost:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.07
    subsample: 0.6
    colsample_bytree: 0.6
  catboost:
    iterations: 500
    depth: 8
    learning_rate: 0.1
  gradient_boosting:
    n_estimators: 200
    learning_rate: 0.15
    max_depth: 6
  adaboost:
    n_estimators: 200
    learning_rate: 0.1
  lightgbm:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6